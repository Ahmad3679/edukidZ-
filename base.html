<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduKids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .card-img-top { height: 200px; object-fit: cover; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">EduKids</a>
    <a class="btn btn-outline-light me-2" href="/locations/">الأماكن التعليمية</a>
    
  <div>
  {% if user.is_authenticated %}
    <span class="text-light me-2">مرحباً، {{ user.username }}</span>
    <a class="btn btn-outline-light" href="/logout/">خروج</a>
  {% else %}
    <a class="btn btn-outline-light me-2" href="/signup/">تسجيل</a>
    <a class="btn btn-outline-light" href="/login/">دخول</a>
  {% endif %}
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Footer -->
<footer class="text-center">
    <p>© 2026 EduKids - جميع الحقوق محفوظة</p>
    <p>📞 للتواصل: 01000000000 | ✉️ info@edukids.com</p>
</footer>

</body>
</html>
