<!DOCTYPE html>
<html>
<head>
    <title>EduKids - Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
    <span class="navbar-brand">EduKids</span>
</nav>

{% extends 'base/base.html' %}

{% block content %}
<h2 class="mb-4">🎓 الكورسات التعليمية</h2>
<div class="row">
    {% for course in courses %}
    <div class="col-md-4">
        <div class="card mb-4 shadow-sm">
            {% if course.image %}
            <img src="{{ course.image.url }}" class="card-img-top" alt="{{ course.title }}">
            {% endif %}
            <div class="card-body">
                <h5>{{ course.title }}</h5>
                <p>{{ course.description }}</p>
                <p class="text-success">💰 {{ course.price }} جنيه</p>
                <form method="post" action="{% url 'buy_course' course.id %}">
                    {% csrf_token %}
                    <button class="btn btn-success w-100">اشترك الآن 💳</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

</body>
</html>
